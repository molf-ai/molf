services:
  server:
    build:
      context: .
      target: server
    ports:
      - "${MOLF_PORT:-7600}:7600"
    environment:
      MOLF_TOKEN: ${MOLF_TOKEN:-molf}
      MOLF_TLS_SAN: "IP:127.0.0.1,DNS:localhost,DNS:server"
    volumes:
      - server-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "7600"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s
    command: ["--host", "0.0.0.0", "--data-dir", "/data"]

  worker:
    build:
      context: .
      target: worker
    restart: on-failure
    environment:
      MOLF_TOKEN: ${MOLF_TOKEN:-molf}
    volumes:
      - worker-data:/work
      - server-data:/tls:ro # shared TLS cert from server
    command: ["--name", "default", "--server-url", "wss://server:7600", "--workdir", "/work", "--tls-ca", "/tls/tls/cert.pem"]
    depends_on:
      server:
        condition: service_healthy

  telegram:
    build:
      context: .
      target: telegram
    profiles: [telegram]
    environment:
      MOLF_TOKEN: ${MOLF_TOKEN:-molf}
      MOLF_SERVER_URL: wss://server:7600
      MOLF_TLS_CA: /tls/tls/cert.pem
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
    volumes:
      - server-data:/tls:ro # shared TLS cert from server
    depends_on:
      server:
        condition: service_healthy

# Named volumes — managed by Docker, no host permission issues
volumes:
  server-data: # server data dir (sessions, config, TLS certs, logs)
  worker-data: # worker working directory
